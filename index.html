<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- Runtime config: sobreescrito por el entrypoint Docker con VITE_API_URL -->
    <script src="/env.js"></script>
    <link rel="icon" type="image/svg+xml" href="/assets/logo-icon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Audiorr</title>
    <!-- Precarga del tema para evitar flash blanco -->
    <script>
      ;(function () {
        // Obtener tema guardado o usar 'light' como default
        var savedTheme = localStorage.getItem('theme') || 'light'
        var isDark =
          savedTheme === 'dark' ||
          (savedTheme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)

        // Aplicar clase inmediatamente ANTES de que se cargue el CSS
        document.documentElement.classList.add(isDark ? 'dark' : 'light')

        // Aplicar color de fondo inmediatamente para evitar flash
        document.documentElement.style.backgroundColor = isDark ? '#121212' : '#f3f4f6'
        document.documentElement.style.colorScheme = isDark ? 'dark' : 'light'
      })()
    </script>
    <style>
      /* Fuentes — declaradas aquí para garantizar disponibilidad antes de cualquier CSS externo */
      @font-face {
        font-family: 'Inter';
        src: url('/assets/Inter/Inter-VariableFont_opsz,wght.ttf') format('truetype');
        font-weight: 100 900;
        font-display: swap;
        font-style: normal;
      }
      @font-face {
        font-family: 'Inter';
        src: url('/assets/Inter/Inter-Italic-VariableFont_opsz,wght.ttf') format('truetype');
        font-weight: 100 900;
        font-display: swap;
        font-style: italic;
      }
      @font-face {
        font-family: 'Space Grotesk';
        src: url('/assets/Space_Grotesk/SpaceGrotesk-VariableFont_wght.ttf') format('truetype');
        font-weight: 300 900;
        font-display: swap;
      }

      /* Estilos críticos para evitar flash - se sobreescribirán por Tailwind */
      html {
        background-color: #f3f4f6;
        font-family: 'Inter', system-ui, sans-serif;
        font-optical-sizing: auto;
        overscroll-behavior: none;
      }
      html.dark {
        background-color: #121212;
      }
      body {
        margin: 0;
        background-color: inherit;
        font-family: 'Inter', system-ui, sans-serif;
        overflow: hidden;
        overscroll-behavior: none;
      }

      /* ── Splash screen ─────────────────────────────────────────────────────── */
      /* Se muestra desde el primer frame hasta que React llama a hideSplash().   */
      /* Cubre cualquier flash de contenido sin renderizar.                        */
      #splash-screen {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #f3f4f6;
        transition: opacity 0.25s ease-out;
      }
      html.dark #splash-screen {
        background-color: #121212;
      }
      #splash-screen.hiding {
        opacity: 0;
        pointer-events: none;
      }
      #splash-logo {
        width: 88px;
        height: 88px;
        /* Logo es oscuro por defecto — en dark mode lo invertimos a blanco */
        filter: brightness(0);
      }
      html.dark #splash-logo {
        filter: brightness(0) invert(1);
      }
    </style>
  </head>
  <body>
    <!-- Splash screen: visible inmediatamente, removido por React al montar -->
    <div id="splash-screen" aria-hidden="true">
      <img id="splash-logo" src="/assets/logo-icon.svg" alt="" draggable="false" />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
